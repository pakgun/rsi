name: Daily Stock RSI Alert

on:
  schedule:
    # 한국 09시~17시 매시 정각 (UTC 기준 00시~08시) / 월~금
    - cron: '0 0-8 * * 1-5'
  workflow_dispatch: # 수동 실행 버튼 활성화

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        # 최신 버전으로 업데이트 (v3 -> v4)
        uses: actions/checkout@v4

      - name: Set up Python
        # 최신 버전으로 업데이트 (v4 -> v5)
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run script
        env:
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        run: python main.py
